<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}OMR Validator{% endblock %}</title>
  <style>
    :root { --fg:#1c1c1c; --muted:#6b7280; --bd:#e5e7eb; --bg:#fafafa; --accent:#2563eb; --ok:#16a34a; --warn:#d97706; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; color:var(--fg); background:var(--bg); }
    header { padding:12px 20px; background:#fff; border-bottom:1px solid var(--bd); display:flex; gap:18px; align-items:center; }
    header a { text-decoration:none; color:var(--fg); font-weight:500; }
    header a.active { color: var(--accent); }
    header .spacer { flex:1; }
    main { padding:20px; max-width:1400px; margin:0 auto; }
    h1 { font-size:20px; margin:0 0 12px; }
    h2 { font-size:16px; margin:16px 0 8px; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { border-bottom:1px solid var(--bd); padding:8px 10px; text-align:left; font-size:14px; }
    th { background:#f3f4f6; }
    .muted { color: var(--muted); }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px; }
    .pill-pending { background:#fef3c7; color:#92400e; }
    .pill-completed { background:#dcfce7; color:#166534; }
    .pill-auto_validated { background:#dbeafe; color:#1e40af; }
    button, .btn { font:inherit; padding:8px 12px; border:1px solid var(--bd); background:#fff; border-radius:6px; cursor:pointer; }
    button:hover, .btn:hover { background:#f3f4f6; }
    .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-primary:hover { background:#1d4ed8; }
    .messages { margin-bottom:12px; }
    .messages .msg { padding:8px 12px; border-radius:6px; margin-bottom:6px; }
    .messages .msg.success { background:#dcfce7; color:#166534; }
    .messages .msg.error { background:#fee2e2; color:#991b1b; }
    .toolbar { display:flex; gap:8px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
    .toolbar .group { display:flex; gap:0; }
    .toolbar .group .btn { border-radius:0; border-right-width:0; }
    .toolbar .group .btn:first-child { border-top-left-radius:6px; border-bottom-left-radius:6px; }
    .toolbar .group .btn:last-child { border-radius:0 6px 6px 0; border-right-width:1px; }
    .toolbar .group .btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <strong>OMR Validator</strong>
    <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{% url 'stats' %}" {% if request.resolver_match.url_name == 'stats' %}class="active"{% endif %}>Stats</a>
    <a href="{% url 'export' %}">Export JSON</a>
    <div class="spacer"></div>
    <span class="muted">{% block headinfo %}{% endblock %}</span>
  </header>
  <main>
    {% if messages %}
      <div class="messages">
        {% for m in messages %}
          <div class="msg {{ m.tags }}">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
